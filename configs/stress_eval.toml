[data]
grid_rows = 8
grid_cols = 8
zone_mode = "tlc_location_id"
zone_count_override = 263
step_minutes = 10
start_hour = 0
end_hour = 24
use_first_n_days = 7
train_days = 5
val_days = 1
test_days = 1

[env]
nmax = 64
min_active_agents = 24
max_active_agents = 64
charge_station_count = 5
charger_capacity = 4
max_queue_length = 8
battery_low_threshold = 0.25
battery_mid_threshold = 0.60
charge_rate_per_step = 0.18
move_consumption = 0.03
service_consumption = 0.02
idle_consumption = 0.005
low_battery_penalty_weight = 0.35
empty_move_penalty = 0.08
idle_penalty = 0.02
service_violation_penalty = 0.05
default_charge_price = 1.0

[model]
variant = "v2"
zone_embedding_dim = 16
hidden_dim = 128
fleet_hidden_dim = 128
dropout = 0.1
aux_hidden_dim = 64
critic_ensemble_size = 2
vehicle_token_dim = 128
use_layer_norm = true

[set_encoder]
type = "deepsets"
hidden_dim = 128
num_heads = 4
num_inducing_points = 8
pooling = "mean"
use_fleet_signature_skip = true

[temporal]
history_len = 6
encoder_type = "gru"
hidden_dim = 96
num_layers = 1

[train]
seed = 7
device = "auto"
total_episodes = 1
rollout_episodes_per_update = 1
ppo_epochs = 1
minibatch_size = 8
gamma = 0.99
gae_lambda = 0.95
ppo_clip = 0.2
entropy_coef = 0.01
value_coef = 0.5
aux_coef = 0.2
cost_value_coef = 0.3
learning_rate = 0.0003
weight_decay = 0.00001
max_grad_norm = 0.8
eval_interval = 1
save_interval = 1

[domain_randomization]
enabled = false
demand_scale_min = 1.0
demand_scale_max = 1.0
travel_time_noise_min = 1.0
travel_time_noise_max = 1.0
charge_price_scale_min = 1.0
charge_price_scale_max = 1.0
charger_capacity_scale_min = 1.0
charger_capacity_scale_max = 1.0
peak_shock_probability = 0.0
peak_shock_scale_min = 1.0
peak_shock_scale_max = 1.0
event_day_probability = 0.0
event_day_scale_min = 1.0
event_day_scale_max = 1.0
apply_to_eval = true

[reward]
profit_weight = 1.0
efficiency_weight = 1.0
battery_weight = 1.0

[offline_rl]
enabled = false
algorithm = "iql"
dataset_episodes = 2
pretrain_epochs = 1
batch_size = 8
expectile = 0.7
temperature = 1.5
cql_alpha = 0.1
awac_lambda = 1.0

[online_finetune]
offline_ratio_start = 0.0
offline_ratio_end = 0.0
offline_ratio_decay_steps = 1
planner_enabled = true
uncertainty_threshold = 0.2
online_replay_capacity = 128

[safety]
battery_limit = 0.05
charger_limit = 0.10
service_limit = 0.25
multiplier_init = 0.1
multiplier_lr = 0.05
pid_kp = 1.0
pid_ki = 0.1
pid_kd = 0.0

[planner]
top_k_zones = 4
use_value_scoring = true
use_short_horizon_rollout = false
fallback_policy = "greedy"
risk_trigger_soc = 0.18
planner_mode = "planner"
actor_prior_weight = 1.0
value_weight = 0.1
cost_penalty_weight = 0.5
uncertainty_penalty_weight = 0.25

[evaluation]
standard_episodes = 1
stress_episodes = 1
unseen_fleet_sizes = [16, 24, 40, 64]
charger_outage_levels = [0.0, 0.5, 0.75]
demand_shock_levels = [1.0, 1.5, 2.0]
travel_time_shock_levels = [1.0, 1.2, 1.5]
event_day_presets = ["baseline", "concert", "rain", "sports"]
